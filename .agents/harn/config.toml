# harn configuration — generated by `harn init`
# This file should be committed to version control.

[project]
name = "harn"
created = "2026-04-07"
harn_version = "0.1.0"

[tools]
agents = ["codex", "claude-code"]

[init]
stack = "rust"

[init.file_hashes]
# Hand-authored files — no init hashes. harn treats these as already-customized.
# Only workflow templates retain hashes (they were copied verbatim from harn's own templates/).
"docs/templates/exec-plan.md" = "8ca0cedd825b240642883a838ddc3966da3bf2632d78d5ce995182639cbe520c"
"docs/templates/sprint-contract.md" = "a6997fbd077467652388987b1fc626b781548de6077d5e3c6eedfd004f80b29c"
"docs/templates/handoff.md" = "404b30bd0ba3780249826fa1a432e73e8f0cdbd9e43d29b6f23394a2bae3ce20"

[check]
required_files = [
    "AGENTS.md",
    "ARCHITECTURE.md",
    "docs/evaluation/criteria.md",
]

[gc]
stale_threshold_days = 14
ignore_paths = [
    "docs/HARNESS-SPEC.md",
    "docs/HARNESS-GUIDE.md",
]

[[gc.mappings]]
doc = "docs/commands.md"
code = ["src/cli.rs", "src/init/mod.rs", "src/plan.rs", "src/sprint.rs", "src/check.rs", "src/gc.rs", "src/score.rs", "src/upgrade.rs"]

[[gc.mappings]]
doc = "docs/generated-content.md"
code = ["templates/AGENTS.md.j2", "templates/ARCHITECTURE.md.j2", "templates/CLAUDE.md.j2", "templates/docs/design-docs/core-beliefs.md.j2", "templates/docs/evaluation/criteria.md.j2"]

[[gc.mappings]]
doc = "docs/design.md"
code = ["src/config.rs", "src/init/mod.rs", "src/init/render.rs", "src/gc.rs", "src/upgrade.rs"]

[[gc.mappings]]
doc = "ARCHITECTURE.md"
code = ["src/main.rs", "src/cli.rs", "src/config.rs", "src/detect.rs", "src/init/mod.rs", "src/init/render.rs", "src/plan.rs", "src/sprint.rs", "src/check.rs", "src/gc.rs", "src/score.rs", "src/upgrade.rs", "src/status.rs", "src/types.rs"]
